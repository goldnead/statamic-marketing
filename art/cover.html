<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    background: radial-gradient(1200px 700px at 78% 22%, #064E3B 0%, #0C3B44 55%, #0B1E2B 100%);
    color: #fff; overflow: hidden; position: relative;
  }
  .wrap { display: flex; height: 100%; align-items: center; padding: 0 92px; gap: 64px; }
  .copy { max-width: 660px; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 22px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase;
    color: #A7F3D0; margin-bottom: 26px;
  }
  .eyebrow .dot { width: 12px; height: 12px; border-radius: 50%; background: #34D399; box-shadow: 0 0 18px #34D399; }
  h1 { font-size: 78px; line-height: 1.02; font-weight: 800; letter-spacing: -.02em; }
  h1 .accent { background: linear-gradient(90deg,#6EE7B7,#7DD3FC); -webkit-background-clip: text; background-clip: text; color: transparent; }
  p.sub { margin-top: 28px; font-size: 30px; line-height: 1.35; color: #CBD5E1; font-weight: 400; }
  .badges { margin-top: 40px; display: flex; gap: 14px; }
  .badge { font-size: 22px; font-weight: 600; padding: 12px 22px; border-radius: 999px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.16); color: #D1FAE5; }
  .art { flex: 1; display: flex; align-items: center; justify-content: center; }
  .glyph { width: 360px; height: 360px; filter: drop-shadow(0 30px 60px rgba(0,0,0,.45)); }
  .corner { position: absolute; right: -120px; bottom: -160px; width: 520px; height: 520px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(14,165,233,.30), transparent 60%); }
</style>
</head>
<body>
  <div class="corner"></div>
  <div class="wrap">
    <div class="copy">
      <span class="eyebrow"><span class="dot"></span>Statamic Addon</span>
      <h1>Statamic<br><span class="accent">Marketing</span></h1>
      <p class="sub">Newsletters &amp; email campaigns native to Statamic — lists, double opt-in, sending &amp; tracking in your Control Panel.</p>
      <div class="badges">
        <span class="badge">Lists</span>
        <span class="badge">Campaigns</span>
        <span class="badge">Tracking</span>
        <span class="badge">Opt-in</span>
      </div>
    </div>
    <div class="art">
      <svg class="glyph" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
            <stop stop-color="#10B981"/><stop offset="1" stop-color="#0EA5E9"/>
          </linearGradient>
        </defs>
        <rect width="512" height="512" rx="112" fill="url(#bg)"/>
        <rect x="116" y="176" width="280" height="196" rx="28" fill="#fff"/>
        <path d="M132 204 L256 300 L380 204" stroke="url(#bg)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <g stroke="#fff" stroke-width="18" stroke-linecap="round">
          <path d="M256 128 L256 96"/>
          <path d="M196 142 L178 116"/>
          <path d="M316 142 L334 116"/>
        </g>
      </svg>
    </div>
  </div>
</body>
</html>
