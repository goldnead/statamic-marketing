name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  php-syntax:
    runs-on: ubuntu-latest
    name: PHP syntax check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Lint every PHP file
        run: |
          # Fail if any file has a parse error.
          set -e
          find src tests config database routes -type f -name '*.php' \
            | xargs -n1 -P4 php -l > /dev/null
          echo "✓ no syntax errors"

  composer-validate:
    runs-on: ubuntu-latest
    name: Validate composer.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      # Not --strict: goldnead/statamic-leadhub is an unpublished sibling
      # resolved via a path repository, so its constraint is deliberately the
      # unbound "*@dev" — which --strict rejects as a warning.
      - name: Validate composer.json
        run: composer validate --no-check-publish
